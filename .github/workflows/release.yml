name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ./scripts/package-release.sh linux amd64
          ./scripts/package-release.sh linux arm64

      - name: Collect release contributors from pull requests
        id: contributors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -vx "${GITHUB_REF_NAME}" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${GITHUB_SHA}"
          else
            RANGE="${GITHUB_SHA}"
          fi

          CONTRIBUTOR_FILE="$(mktemp)"
          COMMITS="$(git log --no-merges --format='%H' "${RANGE}")"

          for commit_sha in ${COMMITS}; do
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${commit_sha}/pulls" \
              --jq '.[].user.login' >>"${CONTRIBUTOR_FILE}" || true
          done

          sort -u -o "${CONTRIBUTOR_FILE}" "${CONTRIBUTOR_FILE}"
          {
            echo "previous_tag=${PREVIOUS_TAG}"
            echo "contributors_file=${CONTRIBUTOR_FILE}"
          } >>"${GITHUB_OUTPUT}"

      - name: Generate release notes
        id: changelog
        run: |
          NOTES_FILE="$(./scripts/generate-changelog.sh "${GITHUB_REF_NAME}" "${{ steps.contributors.outputs.previous_tag }}" "${GITHUB_SHA}" "${{ steps.contributors.outputs.contributors_file }}")"
          {
            echo "notes_file=${NOTES_FILE}"
          } >>"${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            dist/aggr-linux-amd64.tar.gz
            dist/aggr-linux-arm64.tar.gz
